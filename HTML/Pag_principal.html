<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portafolio</title>
    <link rel="stylesheet" href="../CSS/Estilos.css">
</head>

<body>

    <!--Barra de navegacion-->
    <nav>
        <h2 class="Text_barra">Portafolio</h2>
        <div>
            <a href="#">Inicio</a>
            <a href="#servicios">Servicios</a>
            <a href="#portafolio">Portafolio</a>
            <a href="#contacto">Contacto</a>
        </div>
    </nav>
    
    <!--Contactanos-->
    <section class="Contacto">
        <h1>Creamos soluciones digitales</h1>
        <p>Desarrollo de paginas web a medida</p>
        <button class="btn">Contactanos</button>
    </section>

    <!--Portafolio-->
    <section id="Portafolio">

        <h2>Portafolio</h2>

        <div class="Carrusel">

            <img id="Img_Carrusel" src="../public/Img_prueba1.webp">

            <div class="Carrusel_overlay">
                <h3 id="Titulo_overlay">Proyecto 1</h3>
                <p id="Texto_overlay">Sistema web prueba</p>
            </div>

            <button id="antes">←</button>
            <button id="despues">→</button>
        </div>
    </section>

    <!--Opiniones-->
    <section>
        <h2>Opiniones</h2>
        <div class="Grid Grid-3">
            <div class="card">Texto prueba -- cliente1</div>
            <div class="card">Texto prueba -- cliente2</div>
        </div>
    </section>

    <!--Contactar-->
    <section id="Contactar">
        <h2>Contactanos</h2>
        <form onsubmit="return enviarForm()">
            <input type="text" placeholder="Nombre" required>
            <input type="email" placeholder="Email" required>
            <textarea placeholder="Mensaje" required></textarea>
            <button class="btn">Enviar</button>
        </form>
    </section>

    <!--Footer-->
    <footer>
        Guateplaya Inc | 2026
    </footer>

    <!--Scripts-->
    <script src="../Scripts/Carrusel.js"></script>

</body>

</html>
