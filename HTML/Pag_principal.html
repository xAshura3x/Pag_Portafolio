<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portafolio</title>

    <!--Bootstrap-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="../CSS/Estilos.css">
</head>

<body class="mi-portafolio">

    <!--Navbar-->
    <nav class="navbar navbar-expand-lg mi-navbar">
        <div class="container">

            <h2 class="Text_barra m-0">Portafolio</h2>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="menu">
                <div class="ms-auto d-flex flex-column flex-lg-row align-items-lg-center">
                    <a class="nav-link mi-link" href="#">Inicio</a>
                    <a class="nav-link mi-link" href="#servicios">Servicios</a>
                    <a class="nav-link mi-link" href="#Portafolio">Portafolio</a>
                    <a class="nav-link mi-link" href="#Contactar">Contacto</a>
                </div>
            </div>

        </div>
    </nav>
    
    <!--Hero-->
    <section class="Contacto text-center">
        <h1>Creamos soluciones digitales</h1>
        <p>Desarrollo de paginas web a medida</p>
        <button class="mi-btn">Contactanos</button>
    </section>

    <!--Portafolio-->
    <section id="Portafolio">
        <div class="container-fluid">

            <div id="miCarrusel" class="carousel slide carousel-fade" data-bs-ride="carousel">

                <!--Indicadores-->
                <div class="carousel-indicators"></div>

                <!--Slides-->
                <div class="carousel-inner"></div>

            </div>

        </div>
    </section>

    <!--Opiniones-->
    <section>
        <div class="container">
            <h2>Opiniones</h2>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <div class="mi-card">Texto prueba -- cliente1</div>
                </div>
                <div class="col-md-6 mb-3">
                    <div class="mi-card">Texto prueba -- cliente2</div>
                </div>
            </div>
        </div>
    </section>

    <!--Contacto-->
    <section id="Contactar">
        <div class="container">
            <h2>Contactanos</h2>

            <form class="mx-auto" style="max-width: 500px;" onsubmit="return enviarForm()">
                <input type="text" placeholder="Nombre" required>
                <input type="email" placeholder="Email" required>
                <textarea placeholder="Mensaje" required></textarea>
                <button class="mi-btn w-100">Enviar</button>
            </form>
        </div>
    </section>

    <!--Footer-->
    <footer>
        Guateplaya Inc | 2026
    </footer>

    <!--Scripts-->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../Scripts/Carrusel.js"></script>

</body>

</html>
