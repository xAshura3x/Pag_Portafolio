<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Catalogo completo de proyectos desarrollados por OlympusDev.">
    <meta name="keywords" content="catalogo, proyectos, portafolio, desarrollo web, OlympusDev">
    <meta name="author" content="OlympusDev">
    <title>Catalogo de Proyectos - OlympusDev</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../CSS/Estilos.css">
</head>

<body class="mi-portafolio">

    <nav class="navbar navbar-expand-lg mi-navbar">
        <div class="container-fluid px-4">
            <h2 class="Text_barra m-0">
                <a class="Text_barra-link" href="Pag_principal.html" aria-label="Ir al inicio">
                    <img src="../public/logo_olympusdev_escudo.webp" alt="" class="logo-navbar" aria-hidden="true">
                    <span class="logo-brand-text"><span class="yellow">O</span>lympus<span class="yellow">D</span>ev</span>
                </a>
            </h2>

            <div class="dropdown d-lg-none">
                <button class="btn mi-dropdown-btn" type="button" data-bs-toggle="dropdown" aria-expanded="false" aria-label="Abrir menú de navegación">
                    <span class="mi-hamburger" aria-hidden="true"></span>
                </button>
                <ul class="dropdown-menu dropdown-menu-end mi-dropdown-menu">
                    <li><a class="dropdown-item" href="Pag_principal.html">Inicio</a></li>
                    <li><a class="dropdown-item" href="Pag_principal.html#Portafolio">Proyectos Principales</a></li>
                    <li><a class="dropdown-item" href="#catalogo">Catálogo Completo</a></li>
                </ul>
            </div>

            <div class="collapse navbar-collapse d-none d-lg-block">
                <div class="ms-auto d-flex flex-lg-row align-items-lg-center">
                    <a class="nav-link mi-link" href="Pag_principal.html">Inicio</a>
                    <a class="nav-link mi-link" href="Pag_principal.html#Portafolio">Proyectos Principales</a>
                    <a class="nav-link mi-link" href="#catalogo">Catálogo Completo</a>
                </div>
            </div>
        </div>
    </nav>

    <section class="Contacto text-center">
        <h1>Catalogo de proyectos</h1>
        <p>Haz clic en cada proyecto para ver imagen y descripcion</p>
    </section>

    <section id="catalogo">
        <div class="container">
            <div id="catalogoProyectos" class="row g-4"></div>
        </div>
    </section>

    <div class="modal fade" id="modalProyecto" tabindex="-1" aria-labelledby="proyectoModalTitulo" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content mi-modal">
                <div class="modal-header">
                    <h5 class="modal-title" id="proyectoModalTitulo"></h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
                </div>
                <div class="modal-body">
                    <img id="proyectoModalImagen" class="modal-proyecto-img" src="" alt="">
                    <p id="proyectoModalDescripcion" class="mb-0"></p>
                </div>
            </div>
        </div>
    </div>

    <footer class="mi-footer">
        <div class="container">
            <p class="text-center mb-0">© 2026 OlympusDev</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../Scripts/ProyectosData.js"></script>
    <script src="../Scripts/Proyectos.js"></script>

</body>

</html>
